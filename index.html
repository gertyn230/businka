<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>💖 Для тебе</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      text-align: center;
      background: radial-gradient(circle, #ff4d6d, #c9184a);
      color: white;
    }

    h1 {
      margin-top: 15vh;
      font-size: 3em;
      text-shadow: 0 0 20px black;
    }

    #text {
      font-size: 1.8em;
      margin-top: 20px;
      transition: 0.5s;
    }

    button {
      margin: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 20px;
      font-size: 1.1em;
      cursor: pointer;
      background: white;
      color: #c9184a;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }

    .heart {
      position: absolute;
      color: #fff;
      font-size: 20px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); opacity: 1; }
      to { transform: translateY(110vh); opacity: 0; }
    }

    #photo {
      margin-top: 20px;
      width: 200px;
      border-radius: 20px;
      box-shadow: 0 0 20px black;
      display: none;
    }

    #buttons {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>💖 Для тебе 💖</h1>

<div id="text">Ти найкраща 💕</div>

<div id="buttons">
  <button onclick="showLove()">💌 Сюрприз</button>
  <button onclick="toggleMusic()">🎵 Музика</button>
</div>

<img id="photo" src="https://i.imgur.com/1Q9Z1Zm.jpg">

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b8c5d5b3.mp3?filename=romantic-110397.mp3" type="audio/mpeg">
</audio>

<script>
const messages = [
  "Ти найкраща 💕",
  "Ти дуже красива 😍",
  "Я тебе дуже ціную 💖",
  "Ти моє щастя ✨",
  "Бусінка ти наймиліша 🥰",
  "З тобою світ кращий 🌸"
];

let i = 0;
setInterval(() => {
  i = (i + 1) % messages.length;
  document.getElementById("text").innerText = messages[i];
}, 2500);

// 💖 сердечка
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";
  heart.style.fontSize = (10 + Math.random() * 25) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 150);

// 💌 сюрприз
function showLove() {
  alert("💖 Ти найцінніша людина 💖");
  document.getElementById("photo").style.display = "block";
}

// 🎵 музика (FIX для браузера)
let musicPlaying = false;

function toggleMusic() {
  const music = document.getElementById("music");

  if (!musicPlaying) {
    music.play().then(() => {
      musicPlaying = true;
    }).catch(() => {
      alert("Натисни ще раз, браузер блокує звук 💖");
    });
  } else {
    music.pause();
    musicPlaying = false;
  }
}
</script>

</body>
</html>
