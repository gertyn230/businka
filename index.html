<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>💖 Для тебе</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(120deg, #ff4d6d, #ff8fa3, #ffc2d1);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20vh;
      font-size: 3em;
      text-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    #text {
      font-size: 1.8em;
      margin-top: 20px;
      transition: 0.5s;
    }

    .heart {
      position: absolute;
      color: white;
      font-size: 20px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      from {
        transform: translateY(-10vh);
        opacity: 1;
      }
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<h1>💖 Для тебе 💖</h1>
<div id="text">Ти найкраща 💕</div>

<script>
  const messages = [
    "Ти найкраща 💕",
    "Ти дуже красива 😍",
    "Я тебе дуже ціную 💖",
    "Ти робиш мій день кращим 🌸",
    "Ти моє щастя ✨",
    "Бусінка ти наймиліша 🥰"
  ];

  let i = 0;
  setInterval(() => {
    i = (i + 1) % messages.length;
    document.getElementById("text").innerText = messages[i];
  }, 2500);

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (2 + Math.random() * 3) + "s";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 200);
</script>

</body>
</html>
