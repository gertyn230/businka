<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>💖 Для тебе</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* зорі */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  0% {opacity:0.2;}
  50% {opacity:1;}
  100% {opacity:0.2;}
}

/* контент */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 8vh;
}

h1 {
  font-size: 3em;
  text-shadow: 0 0 20px pink;
}

#msg {
  font-size: 1.6em;
  margin: 15px;
}

/* кнопки */
button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.pink { background: #ff4d6d; color: white; }
.white { background: white; color: #ff4d6d; }

/* фото */
#slider {
  width: 280px;
  border-radius: 20px;
  margin-top: 10px;
  transition: 0.5s;
  box-shadow: 0 0 20px #ff4d6d;
}

/* сердечка */
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from { transform: translateY(-10vh); opacity:1; }
  to { transform: translateY(110vh); opacity:0; }
}
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">

<h1>💖 Для тебе 💖</h1>

<div id="msg">Ти найкраща 💕</div>

<img id="slider" src="images/1.jpg">

<br>

<button class="pink" onclick="loveBoom()">💌 Люблю тебе</button>
<button class="white" onclick="toggleMusic()">🎵 Музика</button>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">
</audio>

let i = 0;
setInterval(() => {
  i = (i + 1) % messages.length;
  document.getElementById("msg").innerText = messages[i];
}, 2500);

/* слайдер фото */
const photos = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg",
  "images/4.jpg",
  "images/5.jpg",
  "images/6.jpg",
  "images/7.jpg",
  "images/8.jpg"
];

let p = 0;

setInterval(() => {
  p = (p + 1) % photos.length;
  document.getElementById("slider").style.opacity = 0;

  setTimeout(() => {
    document.getElementById("slider").src = photos[p];
    document.getElementById("slider").style.opacity = 1;
  }, 300);

}, 3000);

/* сердечка */
function heart(x, y) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerText = "💖";
  h.style.left = x + "px";
  h.style.top = y + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 4000);
}

/* любовний вибух */
function loveBoom() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      heart(
        window.innerWidth/2 + (Math.random()*300-150),
        window.innerHeight/2 + (Math.random()*300-150)
      );
    }, i*40);
  }
}

/* музика */
let playing = false;

function toggleMusic() {
  let music = document.getElementById("music");
  music.volume = 0.5;

  if (!playing) {
    music.play()
      .then(() => playing = true)
      .catch(err => console.log("audio error:", err));
  } else {
    music.pause();
    playing = false;
  }
}

</script>
